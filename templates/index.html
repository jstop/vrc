<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VRC — Verifiable Reasoning Credential</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0c;
  --surface: #111114;
  --surface2: #1a1a1f;
  --border: #2a2a30;
  --text: #e0e0e4;
  --text-dim: #6e6e78;
  --accepted: #34d399;
  --rejected: #f87171;
  --undecided: #fbbf24;
  --attack: #ef4444;
  --support: #22d3ee;
  --accent: #818cf8;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

.grain {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 9999;
}

header {
  padding: 2rem 3rem 1rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: baseline;
  gap: 1.5rem;
}

header h1 {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700;
  font-size: 1.1rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--accent);
}

header .tagline {
  font-size: 0.85rem;
  color: var(--text-dim);
  font-weight: 300;
}

.container {
  display: grid;
  grid-template-columns: 420px 1fr;
  min-height: calc(100vh - 60px);
}

.input-panel {
  padding: 2rem;
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 1.5rem;
}

.input-panel label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-dim);
}

textarea {
  width: 100%;
  flex: 1;
  min-height: 300px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.9rem;
  line-height: 1.6;
  padding: 1rem;
  resize: none;
  transition: border-color 0.2s;
}

textarea:focus {
  outline: none;
  border-color: var(--accent);
}

textarea::placeholder {
  color: var(--text-dim);
  opacity: 0.5;
}

button.analyze {
  background: var(--accent);
  color: #fff;
  border: none;
  padding: 0.85rem 2rem;
  border-radius: 6px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.8rem;
  font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s;
}

button.analyze:hover { background: #6366f1; transform: translateY(-1px); }
button.analyze:active { transform: translateY(0); }
button.analyze:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

.output-panel {
  display: flex;
  flex-direction: column;
  position: relative;
}

.graph-container {
  flex: 1;
  position: relative;
  overflow: hidden;
}

.graph-container svg {
  width: 100%;
  height: 100%;
  display: block;
}

.results-bar {
  padding: 1rem 2rem;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 2rem;
  background: var(--surface);
  min-height: 56px;
}

.stat {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.75rem;
}

.stat .dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
}

.stat .dot.accepted { background: var(--accepted); }
.stat .dot.rejected { background: var(--rejected); }
.stat .dot.undecided { background: var(--undecided); }

.stat .count {
  font-weight: 700;
  font-size: 1rem;
}

.stat .label {
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

button.download {
  margin-left: auto;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-dim);
  padding: 0.5rem 1rem;
  border-radius: 4px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s;
}

button.download:hover { border-color: var(--accent); color: var(--accent); }

/* Claims list panel */
.claims-panel {
  max-height: 280px;
  overflow-y: auto;
  padding: 1rem 2rem;
  border-top: 1px solid var(--border);
  background: var(--surface2);
}

.claims-panel::-webkit-scrollbar { width: 4px; }
.claims-panel::-webkit-scrollbar-track { background: transparent; }
.claims-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.claim-item {
  display: flex;
  align-items: flex-start;
  gap: 0.75rem;
  padding: 0.6rem 0;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  font-size: 0.82rem;
  line-height: 1.5;
}

.claim-item:last-child { border-bottom: none; }

.claim-id {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  font-weight: 700;
  min-width: 32px;
  padding: 2px 6px;
  border-radius: 3px;
  text-align: center;
  flex-shrink: 0;
  margin-top: 1px;
}

.claim-id.accepted { background: rgba(52, 211, 153, 0.15); color: var(--accepted); }
.claim-id.rejected { background: rgba(248, 113, 113, 0.15); color: var(--rejected); }
.claim-id.undecided { background: rgba(251, 191, 36, 0.15); color: var(--undecided); }

.claim-text { color: var(--text); }

/* Loading state */
.loading {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 1rem;
  background: var(--bg);
  z-index: 10;
}

.loading.hidden { display: none; }

.spinner {
  width: 32px;
  height: 32px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

.loading-text {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.75rem;
  color: var(--text-dim);
  letter-spacing: 0.06em;
}

/* Empty state */
.empty-state {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 0.75rem;
}

.empty-state .icon {
  font-size: 2.5rem;
  opacity: 0.15;
}

.empty-state p {
  color: var(--text-dim);
  font-size: 0.85rem;
  max-width: 280px;
  text-align: center;
  line-height: 1.6;
}

/* Error state */
.error-msg {
  padding: 0.75rem 1rem;
  background: rgba(248, 113, 113, 0.1);
  border: 1px solid rgba(248, 113, 113, 0.2);
  border-radius: 6px;
  color: var(--rejected);
  font-size: 0.82rem;
}

.error-msg.hidden { display: none; }

/* Tooltip */
.tooltip {
  position: absolute;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 0.75rem 1rem;
  max-width: 320px;
  font-size: 0.8rem;
  line-height: 1.5;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.15s;
  z-index: 100;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}

.tooltip .tt-id {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  font-weight: 700;
  margin-bottom: 0.3rem;
}

.tooltip .tt-status {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 0.5rem;
}

/* Edge labels */
.edge-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  fill: var(--text-dim);
  opacity: 0.6;
}

/* Arrow markers */
marker path { stroke: none; }

/* Responsive */
@media (max-width: 900px) {
  .container {
    grid-template-columns: 1fr;
    grid-template-rows: auto 1fr;
  }
  .input-panel {
    border-right: none;
    border-bottom: 1px solid var(--border);
  }
  textarea { min-height: 150px; }
  .graph-container { min-height: 400px; }
}
</style>
</head>
<body>
<div class="grain"></div>

<header>
  <h1>VRC</h1>
  <span class="tagline">Verifiable Reasoning Credential — formal argumentation over natural language claims</span>
</header>

<div class="container">
  <div class="input-panel">
    <label>Paste text to analyze</label>
    <textarea id="inputText" placeholder="Paste an argument, position paper, AI-generated analysis, policy proposal, or any text making claims...

The system will extract discrete claims, identify which ones attack each other, and compute which conclusions are formally defensible."></textarea>
    <div id="errorMsg" class="error-msg hidden"></div>
    <button class="analyze" id="analyzeBtn" onclick="analyze()">Analyze Reasoning</button>
  </div>

  <div class="output-panel">
    <div class="graph-container" id="graphContainer">
      <div class="empty-state" id="emptyState">
        <div class="icon">⬡</div>
        <p>Paste text and click Analyze to see which claims survive formal challenge</p>
      </div>
      <div class="loading hidden" id="loading">
        <div class="spinner"></div>
        <div class="loading-text">Extracting claims & computing extensions...</div>
      </div>
      <svg id="graph"></svg>
      <div class="tooltip" id="tooltip"></div>
    </div>
    <div class="claims-panel hidden" id="claimsPanel"></div>
    <div class="results-bar" id="resultsBar" style="display:none;">
      <div class="stat">
        <span class="dot accepted"></span>
        <span class="count" id="acceptedCount">0</span>
        <span class="label">Accepted</span>
      </div>
      <div class="stat">
        <span class="dot rejected"></span>
        <span class="count" id="rejectedCount">0</span>
        <span class="label">Rejected</span>
      </div>
      <div class="stat">
        <span class="dot undecided"></span>
        <span class="count" id="undecidedCount">0</span>
        <span class="label">Undecided</span>
      </div>
      <button class="download" id="downloadBtn" onclick="downloadVRC()">↓ Download VRC</button>
    </div>
  </div>
</div>

<script>
let currentVRC = null;
let currentData = null;

const colors = {
  accepted: '#34d399',
  rejected: '#f87171',
  undecided: '#fbbf24',
  attack: '#ef4444',
  support: '#22d3ee'
};

async function analyze() {
  const text = document.getElementById('inputText').value.trim();
  if (!text) return;

  const btn = document.getElementById('analyzeBtn');
  const loading = document.getElementById('loading');
  const empty = document.getElementById('emptyState');
  const errorMsg = document.getElementById('errorMsg');

  btn.disabled = true;
  loading.classList.remove('hidden');
  empty.style.display = 'none';
  errorMsg.classList.add('hidden');

  // Clear previous
  d3.select('#graph').selectAll('*').remove();

  try {
    const response = await fetch('/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text })
    });

    const data = await response.json();

    if (data.error) {
      errorMsg.textContent = data.error;
      errorMsg.classList.remove('hidden');
      loading.classList.add('hidden');
      btn.disabled = false;
      return;
    }

    currentData = data;
    currentVRC = data.vrc;

    renderGraph(data);
    renderClaims(data);
    renderStats(data.analysis.summary);

    document.getElementById('resultsBar').style.display = 'flex';

  } catch (err) {
    errorMsg.textContent = 'Analysis failed: ' + err.message;
    errorMsg.classList.remove('hidden');
  }

  loading.classList.add('hidden');
  btn.disabled = false;
}

function renderGraph(data) {
  const container = document.getElementById('graphContainer');
  const width = container.clientWidth;
  const height = container.clientHeight;
  const svg = d3.select('#graph');

  svg.selectAll('*').remove();
  svg.attr('width', width).attr('height', height);

  // Defs for arrow markers
  const defs = svg.append('defs');

  defs.append('marker')
    .attr('id', 'arrow-attack')
    .attr('viewBox', '0 -5 10 10')
    .attr('refX', 28)
    .attr('refY', 0)
    .attr('markerWidth', 6)
    .attr('markerHeight', 6)
    .attr('orient', 'auto')
    .append('path')
    .attr('d', 'M0,-5L10,0L0,5')
    .attr('fill', colors.attack);

  defs.append('marker')
    .attr('id', 'arrow-support')
    .attr('viewBox', '0 -5 10 10')
    .attr('refX', 28)
    .attr('refY', 0)
    .attr('markerWidth', 6)
    .attr('markerHeight', 6)
    .attr('orient', 'auto')
    .append('path')
    .attr('d', 'M0,-5L10,0L0,5')
    .attr('fill', colors.support);

  // Glow filter
  const filter = defs.append('filter').attr('id', 'glow');
  filter.append('feGaussianBlur').attr('stdDeviation', '3').attr('result', 'blur');
  const merge = filter.append('feMerge');
  merge.append('feMergeNode').attr('in', 'blur');
  merge.append('feMergeNode').attr('in', 'SourceGraphic');

  const status = data.analysis.argument_status;

  // Build nodes
  const nodes = data.claims.map(c => ({
    id: c.id,
    text: c.text,
    status: status[c.id] || 'undecided'
  }));

  // Build links
  const links = [];
  data.attacks.forEach(a => {
    links.push({ source: a.from, target: a.to, type: 'attack', reason: a.reason });
  });
  (data.supports || []).forEach(s => {
    links.push({ source: s.from, target: s.to, type: 'support', reason: s.reason });
  });

  // Force simulation
  const simulation = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(links).id(d => d.id).distance(140))
    .force('charge', d3.forceManyBody().strength(-400))
    .force('center', d3.forceCenter(width / 2, height / 2))
    .force('collision', d3.forceCollide().radius(40));

  // Draw links
  const link = svg.append('g')
    .selectAll('line')
    .data(links)
    .join('line')
    .attr('stroke', d => d.type === 'attack' ? colors.attack : colors.support)
    .attr('stroke-width', d => d.type === 'attack' ? 2 : 1.5)
    .attr('stroke-dasharray', d => d.type === 'attack' ? '6,3' : 'none')
    .attr('stroke-opacity', 0.5)
    .attr('marker-end', d => `url(#arrow-${d.type})`);

  // Draw nodes
  const node = svg.append('g')
    .selectAll('g')
    .data(nodes)
    .join('g')
    .call(d3.drag()
      .on('start', dragstarted)
      .on('drag', dragged)
      .on('end', dragended));

  // Node circles
  node.append('circle')
    .attr('r', 20)
    .attr('fill', d => {
      const c = colors[d.status];
      return c + '20';
    })
    .attr('stroke', d => colors[d.status])
    .attr('stroke-width', 2)
    .style('filter', d => d.status === 'accepted' ? 'url(#glow)' : 'none')
    .style('cursor', 'pointer');

  // Node labels
  node.append('text')
    .text(d => d.id)
    .attr('text-anchor', 'middle')
    .attr('dy', '0.35em')
    .attr('fill', d => colors[d.status])
    .attr('font-family', 'JetBrains Mono, monospace')
    .attr('font-size', '11px')
    .attr('font-weight', '700')
    .style('pointer-events', 'none');

  // Tooltip
  const tooltip = document.getElementById('tooltip');

  node.on('mouseover', (event, d) => {
    const statusColor = colors[d.status];
    tooltip.innerHTML = `
      <div class="tt-id" style="color:${statusColor}">${d.id}</div>
      <div class="tt-status" style="color:${statusColor}">${d.status}</div>
      <div>${d.text}</div>
    `;
    tooltip.style.opacity = 1;
  })
  .on('mousemove', (event) => {
    tooltip.style.left = (event.pageX + 15) + 'px';
    tooltip.style.top = (event.pageY - 10) + 'px';
  })
  .on('mouseout', () => {
    tooltip.style.opacity = 0;
  });

  // Tick
  simulation.on('tick', () => {
    // Keep nodes in bounds
    nodes.forEach(d => {
      d.x = Math.max(30, Math.min(width - 30, d.x));
      d.y = Math.max(30, Math.min(height - 30, d.y));
    });

    link
      .attr('x1', d => d.source.x)
      .attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x)
      .attr('y2', d => d.target.y);

    node.attr('transform', d => `translate(${d.x},${d.y})`);
  });

  function dragstarted(event, d) {
    if (!event.active) simulation.alphaTarget(0.3).restart();
    d.fx = d.x;
    d.fy = d.y;
  }

  function dragged(event, d) {
    d.fx = event.x;
    d.fy = event.y;
  }

  function dragended(event, d) {
    if (!event.active) simulation.alphaTarget(0);
    d.fx = null;
    d.fy = null;
  }
}

function renderClaims(data) {
  const panel = document.getElementById('claimsPanel');
  const status = data.analysis.argument_status;

  // Sort: accepted first, then undecided, then rejected
  const order = { accepted: 0, undecided: 1, rejected: 2 };
  const sorted = [...data.claims].sort((a, b) => {
    return (order[status[a.id]] || 1) - (order[status[b.id]] || 1);
  });

  panel.innerHTML = sorted.map(c => {
    const s = status[c.id] || 'undecided';
    return `<div class="claim-item">
      <span class="claim-id ${s}">${c.id}</span>
      <span class="claim-text">${c.text}</span>
    </div>`;
  }).join('');

  panel.classList.remove('hidden');
}

function renderStats(summary) {
  document.getElementById('acceptedCount').textContent = summary.accepted;
  document.getElementById('rejectedCount').textContent = summary.rejected;
  document.getElementById('undecidedCount').textContent = summary.undecided;
}

function downloadVRC() {
  if (!currentVRC) return;
  const blob = new Blob([JSON.stringify(currentVRC, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'verifiable-reasoning-credential.json';
  a.click();
  URL.revokeObjectURL(url);
}

// Handle Enter key
document.getElementById('inputText').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
    analyze();
  }
});
</script>
</body>
</html>
